<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
    <a href="/home">Home</a>
    <a href="/add">Add</a>
</nav>

<h2>All Books</h2>

<table>
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Status</th>
</tr>

{% for b in books %}
<tr>
    <td>{{ b[0] }}</td>
    <td>{{ b[1] }}</td>
    <td>{{ b[2] }}</td>
    <td>
        {% if b[3]==1 %}
            Available
        {% else %}
            Issued
        {% endif %}
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
